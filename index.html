<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Serviços</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:       #1A237E;
  --navy-dark:  #0D1757;
  --navy-light: #283593;
  --accent:     #F57F17;
  --teal:       #00838F;
  --bg:         #F0F2F8;
  --surface:    #FFFFFF;
  --border:     #D0D5E8;
  --text:       #1C1F2E;
  --muted:      #6B7280;
  --green:      #2E7D32;
  --green-bg:   #E8F5E9;
  --red:        #C62828;
  --red-bg:     #FFEBEE;
  --blue:       #1565C0;
  --blue-bg:    #E3F2FD;
  --yellow:     #F57F17;
  --yellow-bg:  #FFF8E1;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Utilities ─────────────────────────────────────────────── */
.hidden { display: none !important; }
.flex   { display: flex; }
.col    { flex-direction: column; }
.gap4   { gap: 4px; }
.gap8   { gap: 8px; }
.gap12  { gap: 12px; }
.gap16  { gap: 16px; }
.between{ justify-content: space-between; }
.center { align-items: center; }
.wrap   { flex-wrap: wrap; }
.w100   { width: 100%; }
.mt8    { margin-top: 8px; }
.mt12   { margin-top: 12px; }
.mt16   { margin-top: 16px; }
.mb8    { margin-bottom: 8px; }
.mb12   { margin-bottom: 12px; }
.bold   { font-weight: 700; }
.small  { font-size: 13px; }
.muted  { color: var(--muted); }
.pointer{ cursor: pointer; }

/* ── Input / Select / Textarea ─────────────────────────────── */
input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--navy); }
textarea { resize: vertical; min-height: 72px; }
label.field-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 6px;
}
.field { margin-bottom: 14px; }

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-primary  { background: var(--navy);   color: #fff; }
.btn-accent   { background: var(--accent); color: #fff; }
.btn-teal     { background: var(--teal);   color: #fff; }
.btn-ghost    { background: transparent; color: var(--navy); border: 1.5px solid var(--border); }
.btn-danger   { background: var(--red-bg); color: var(--red); border: 1.5px solid var(--red); }
.btn-green    { background: var(--green-bg); color: var(--green); border: 1.5px solid var(--green); }

/* ── Modal ─────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,15,40,.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 16px;
}
.modal {
  background: var(--surface);
  border-radius: 16px;
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,.25);
}
.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-header h2 { font-size: 17px; color: var(--navy); }
.modal-close {
  background: none; border: none; font-size: 22px;
  cursor: pointer; color: var(--muted); line-height: 1; padding: 2px;
}
.modal-body  { padding: 22px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }

/* ── Badge ─────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 99px;
}
.badge-pending     { color: var(--muted);  background: #F3F4F6; }
.badge-in_progress { color: var(--blue);   background: var(--blue-bg); }
.badge-done        { color: var(--green);  background: var(--green-bg); }
.badge-delayed     { color: var(--red);    background: var(--red-bg); }
.badge-adm         { color: var(--navy);   background: #E8EAF6; }
.badge-gestor      { color: var(--teal);   background: #E0F7FA; }
.badge-colaborador { color: var(--muted);  background: #F3F4F6; }

/* ── Progress bar ──────────────────────────────────────────── */
.progress { background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

/* ── Header ────────────────────────────────────────────────── */
#app-header {
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-light) 100%);
  box-shadow: 0 4px 20px rgba(13,23,87,.35);
}
.header-inner { max-width: 820px; margin: 0 auto; padding: 18px 16px 0; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.app-title   { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -.02em; }
.app-sub     { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
.user-info   { display: flex; align-items: center; gap: 10px; }
.user-name   { color: rgba(255,255,255,.85); font-size: 13px; font-weight: 600; }

/* ── KPIs ──────────────────────────────────────────────────── */
.kpi-row { display: flex; gap: 10px; margin-bottom: 0; overflow-x: auto; padding-bottom: 0; }
.kpi {
  background: rgba(255,255,255,.12);
  border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 100px;
  border: 1px solid rgba(255,255,255,.1);
}
.kpi-value { font-size: 26px; font-weight: 800; color: #fff; line-height: 1; }
.kpi-label { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 4px; font-weight: 600; }

/* ── Filter tabs ───────────────────────────────────────────── */
.filter-tabs { display: flex; margin-top: 14px; overflow-x: auto; }
.tab-btn {
  background: none; border: none; font-family: inherit;
  color: rgba(255,255,255,.5); font-weight: 500; font-size: 13px;
  cursor: pointer; padding: 10px 14px; white-space: nowrap;
  border-bottom: 3px solid transparent; transition: all .15s;
}
.tab-btn.active { color: #fff; font-weight: 700; border-bottom-color: var(--accent); }

/* ── Main body ─────────────────────────────────────────────── */
#main-body { max-width: 820px; margin: 0 auto; padding: 20px 16px 50px; }

/* ── Search & toolbar ──────────────────────────────────────── */
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
.toolbar input { flex: 1; background: var(--surface); }

/* ── Service card ──────────────────────────────────────────── */
.svc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  overflow: hidden;
  margin-bottom: 12px;
}
.svc-card-head {
  padding: 14px 18px;
  cursor: pointer;
  transition: background .1s;
}
.svc-card-head:hover { background: var(--bg); }
.svc-card-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.svc-card-meta  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.svc-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.svc-card-body  { padding: 14px 18px; border-top: 1px solid var(--border); background: var(--bg); }
.chevron { transition: transform .2s; font-size: 18px; color: var(--navy); }
.chevron.open { transform: rotate(180deg); }

/* ── Plant card ────────────────────────────────────────────── */
.plant-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
}
.plant-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.plant-name { font-weight: 700; font-size: 14px; color: var(--navy); }

/* ── Step row ──────────────────────────────────────────────── */
.step-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 8px;
  margin-top: 6px; cursor: pointer; transition: opacity .1s;
}
.step-row:hover { opacity: .82; }
.step-name { font-size: 13px; font-weight: 500; }

/* ── Login screen ──────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-light) 100%);
  padding: 20px;
}
.login-box {
  background: var(--surface);
  border-radius: 20px;
  padding: 36px 32px;
  width: 100%; max-width: 380px;
  box-shadow: 0 32px 80px rgba(0,0,0,.35);
}
.login-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
.login-title { font-size: 22px; font-weight: 800; color: var(--navy); text-align: center; margin-bottom: 4px; }
.login-sub   { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; }
.login-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 10px; }

/* ── Empty state ───────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 56px 24px;
  background: var(--surface); border-radius: 16px;
  border: 1.5px dashed var(--border);
}
.empty-icon  { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.empty-sub   { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

/* ── Toast ─────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1C1F2E; color: #fff; padding: 10px 22px;
  border-radius: 99px; font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.3); z-index: 9999;
  opacity: 0; transition: opacity .25s;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* ── Admin panel ───────────────────────────────────────────── */
.user-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--bg);
  border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px;
}

/* ── Plant builder inside modal ────────────────────────────── */
.plant-builder {
  background: var(--bg); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 10px;
  border: 1px solid var(--border);
}
.plant-builder-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 560px) {
  .kpi-row { gap: 8px; }
  .kpi-value { font-size: 22px; }
  .toolbar { flex-direction: column; }
  .modal { max-width: 100%; border-radius: 16px 16px 0 0; }
  .modal-overlay { align-items: flex-end; }
}
</style>
</head>
<body>

<!-- ══ LOGIN ═══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏗️</div>
    <div class="login-title">Gestor de Serviços</div>
    <div class="login-sub">Faça login para continuar</div>
    <div class="field">
      <label class="field-label">Usuário</label>
      <input id="l-user" type="text" placeholder="seu usuário" autocomplete="username">
    </div>
    <div class="field">
      <label class="field-label">Senha</label>
      <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary w100" id="btn-login">Entrar</button>
    <div id="login-error" class="login-error hidden"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app" class="hidden">

  <!-- Header -->
  <div id="app-header">
    <div class="header-inner">
      <div class="header-top">
        <div>
          <div class="app-title">🏗 Gestor de Serviços</div>
          <div class="app-sub">Acompanhamento por plantas e etapas</div>
        </div>
        <div class="user-info">
          <span class="user-name" id="hdr-user"></span>
          <span id="hdr-role-badge" class="badge"></span>
          <button class="btn btn-sm btn-ghost" id="btn-admin" style="color:#fff;border-color:rgba(255,255,255,.3);" onclick="openAdmin()">⚙️</button>
          <button class="btn btn-sm btn-ghost" style="color:#fff;border-color:rgba(255,255,255,.3);" onclick="logout()">Sair</button>
        </div>
      </div>
      <!-- KPIs -->
      <div class="kpi-row" id="kpi-row">
        <div class="kpi"><div class="kpi-value" id="kpi-total">0</div><div class="kpi-label">Serviços</div></div>
        <div class="kpi"><div class="kpi-value" id="kpi-done">0</div><div class="kpi-label">Concluídos</div></div>
        <div class="kpi"><div class="kpi-value" id="kpi-delayed">0</div><div class="kpi-label">Atrasados</div></div>
        <div class="kpi"><div class="kpi-value" id="kpi-pct">0%</div><div class="kpi-label">Progresso</div></div>
      </div>
      <!-- Tabs -->
      <div class="filter-tabs">
        <button class="tab-btn active" data-filter="all">Todos</button>
        <button class="tab-btn" data-filter="done">✅ Concluídos</button>
        <button class="tab-btn" data-filter="in_progress">🔄 Em andamento</button>
        <button class="tab-btn" data-filter="delayed">⚠️ Atrasados</button>
        <button class="tab-btn" data-filter="pending">⏳ Pendentes</button>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div id="main-body">
    <div class="toolbar">
      <input id="search-input" type="text" placeholder="🔍 Buscar serviço…">
      <button class="btn btn-accent" id="btn-new-svc">+ Novo serviço</button>
    </div>
    <div id="services-list"></div>
  </div>
</div>

<!-- ══ TOAST ═══════════════════════════════════════════════ -->
<div id="toast"></div>

<!-- ══ MODALS (injetados dinamicamente) ════════════════════ -->
<div id="modal-root"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — substitua pela URL do seu Apps Script publicado
// ══════════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbzHcR04C9s2AiV4hhK6sj8B6wDRBgfeHxb7iNzrliDy-3Xm_bMlpNr9SA3yVQPtjNdMEQ/exec";

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let state = {
  user: null,   // { id, username, role, token }
  services: [], // array de serviços completos
  filter: "all",
  search: "",
};

// ══════════════════════════════════════════════════════════════
// STATUS helpers
// ══════════════════════════════════════════════════════════════
const STATUS = {
  pending:     { label: "Pendente",      icon: "⏳", cls: "badge-pending" },
  in_progress: { label: "Em andamento",  icon: "🔄", cls: "badge-in_progress" },
  done:        { label: "Concluído",     icon: "✅", cls: "badge-done" },
  delayed:     { label: "Atrasado",      icon: "⚠️", cls: "badge-delayed" },
};
const ROLES = {
  adm:          { label: "ADM",          cls: "badge-adm" },
  gestor:       { label: "Gestor",       cls: "badge-gestor" },
  colaborador:  { label: "Colaborador",  cls: "badge-colaborador" },
};

function badge(status) {
  const s = STATUS[status] || STATUS.pending;
  return `<span class="badge ${s.cls}">${s.icon} ${s.label}</span>`;
}
function roleBadge(role) {
  const r = ROLES[role] || { label: role, cls: "" };
  return `<span class="badge ${r.cls}">${r.label}</span>`;
}

function pct(steps) {
  if (!steps.length) return 0;
  return Math.round(steps.filter(s => s.status === "done").length / steps.length * 100);
}

function svcStatus(svc) {
  const all = svc.plants.flatMap(p => p.steps);
  if (!all.length) return "pending";
  if (all.every(s => s.status === "done")) return "done";
  if (all.some(s => s.status === "delayed")) return "delayed";
  if (all.some(s => s.status === "in_progress" || s.status === "done")) return "in_progress";
  return "pending";
}

function progressBar(val, height = 8, color) {
  const c = color || (val === 100 ? "#2E7D32" : "#00838F");
  return `<div class="progress" style="height:${height}px">
    <div class="progress-fill" style="width:${val}%;background:${c}"></div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
async function apiFetch(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const r = await fetch(url);
  return r.json();
}

async function apiPost(body) {
  const r = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, duration = 2800) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), duration);
}

// ══════════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════════
document.getElementById("btn-login").onclick = async () => {
  const username = document.getElementById("l-user").value.trim();
  const password = document.getElementById("l-pass").value;
  const errEl    = document.getElementById("login-error");
  errEl.classList.add("hidden");

  if (!username || !password) { errEl.textContent = "Preencha usuário e senha."; errEl.classList.remove("hidden"); return; }

  const btn = document.getElementById("btn-login");
  btn.disabled = true; btn.textContent = "Entrando…";

  try {
    const res = await apiPost({ action: "login", username, password });
    if (!res.ok) throw new Error(res.error);

    // gera token local simples (o Script valida via decodificação)
    const token = btoa(`${res.data.id}|${res.data.role}|${API_URL.slice(-6)}`);
    state.user  = { ...res.data, token };
    localStorage.setItem("gs_session", JSON.stringify(state.user));

    showApp();
  } catch(e) {
    errEl.textContent = e.message || "Erro ao conectar.";
    errEl.classList.remove("hidden");
  } finally {
    btn.disabled = false; btn.textContent = "Entrar";
  }
};

document.getElementById("l-pass").onkeydown = e => { if (e.key === "Enter") document.getElementById("btn-login").click(); };

function logout() {
  localStorage.removeItem("gs_session");
  state = { user: null, services: [], filter: "all", search: "" };
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login-screen").classList.remove("hidden");
}

function showApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  // Header info
  document.getElementById("hdr-user").textContent = state.user.username;
  const rb = document.getElementById("hdr-role-badge");
  rb.className = "badge " + (ROLES[state.user.role]?.cls || "");
  rb.textContent = ROLES[state.user.role]?.label || state.user.role;

  // Mostra botão admin só para adm
  const ba = document.getElementById("btn-admin");
  if (state.user.role !== "adm") ba.classList.add("hidden");

  // Mostra botão novo serviço só para adm/gestor
  const bn = document.getElementById("btn-new-svc");
  if (!["adm","gestor"].includes(state.user.role)) bn.classList.add("hidden");

  loadServices();
}

// ══════════════════════════════════════════════════════════════
// LOAD SERVICES
// ══════════════════════════════════════════════════════════════
async function loadServices() {
  try {
    const res = await apiFetch({ action: "getServices", token: state.user.token });
    if (!res.ok) throw new Error(res.error);
    state.services = res.data;
    renderAll();
  } catch(e) {
    toast("Erro ao carregar serviços: " + e.message);
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function renderAll() {
  renderKPIs();
  renderList();
}

function renderKPIs() {
  const s = state.services;
  const all = s.flatMap(x => x.plants.flatMap(p => p.steps));
  document.getElementById("kpi-total").textContent   = s.length;
  document.getElementById("kpi-done").textContent    = s.filter(x => svcStatus(x) === "done").length;
  document.getElementById("kpi-delayed").textContent = s.filter(x => svcStatus(x) === "delayed").length;
  const p = all.length ? Math.round(all.filter(s => s.status === "done").length / all.length * 100) : 0;
  document.getElementById("kpi-pct").textContent     = p + "%";
}

function renderList() {
  const list = document.getElementById("services-list");
  const q = state.search.toLowerCase();

  const filtered = state.services.filter(s => {
    const st = svcStatus(s);
    return (state.filter === "all" || state.filter === st)
      && s.name.toLowerCase().includes(q);
  });

  if (!state.services.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🏗️</div>
      <div class="empty-title">Nenhum serviço cadastrado</div>
      <div class="empty-sub">Crie o primeiro serviço para começar o acompanhamento.</div>
      ${["adm","gestor"].includes(state.user.role) ? `<button class="btn btn-primary" onclick="openServiceModal()">+ Criar serviço</button>` : ""}
    </div>`;
    return;
  }

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Nenhum resultado</div>
      <div class="empty-sub">Tente outro filtro ou termo de busca.</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(svc => renderServiceCard(svc)).join("");

  // toggle expand
  filtered.forEach(svc => {
    document.getElementById(`svc-head-${svc.id}`)?.addEventListener("click", () => toggleSvc(svc.id));
  });
}

function renderServiceCard(svc) {
  const st   = svcStatus(svc);
  const all  = svc.plants.flatMap(p => p.steps);
  const p    = pct(all);
  const role = state.user.role;

  const daysLeft = svc.forecast
    ? Math.ceil((new Date(svc.forecast) - new Date()) / 86400000)
    : null;
  const dateColor = daysLeft < 0 ? "var(--red)" : daysLeft <= 7 ? "var(--yellow)" : "var(--muted)";
  const dateStr   = svc.forecast
    ? new Date(svc.forecast + "T12:00:00").toLocaleDateString("pt-BR")
    : "";
  const dayLabel  = daysLeft === null ? "" : daysLeft < 0 ? ` · ${Math.abs(daysLeft)}d atrás`
                  : daysLeft === 0 ? " · hoje" : ` · ${daysLeft}d`;

  // Permissões dos botões
  const canEdit   = ["adm","gestor"].includes(role);
  const canDelete = role === "adm";
  const canDone   = st !== "done";
  const canReact  = st === "done" && ["adm","gestor"].includes(role);

  const actionBtns = `
    ${canDone   ? `<button class="btn btn-sm btn-green"   onclick="event.stopPropagation();concludeSvc('${svc.id}')">✅ Concluir</button>` : ""}
    ${canReact  ? `<button class="btn btn-sm btn-teal"    onclick="event.stopPropagation();reactivateSvc('${svc.id}')">🔄 Reativar</button>` : ""}
    ${canEdit   ? `<button class="btn btn-sm btn-ghost"   onclick="event.stopPropagation();openServiceModal('${svc.id}')">✏️</button>` : ""}
    ${canDelete ? `<button class="btn btn-sm btn-danger"  onclick="event.stopPropagation();deleteSvc('${svc.id}')">🗑</button>` : ""}
  `;

  const plantsHtml = svc.plants.map(plant => {
    const pp = pct(plant.steps);
    const steps = plant.steps.map(step => {
      const s = STATUS[step.status] || STATUS.pending;
      const bg = { pending:"#F3F4F6", in_progress:"var(--blue-bg)", done:"var(--green-bg)", delayed:"var(--red-bg)" }[step.status] || "#F3F4F6";
      return `<div class="step-row" style="background:${bg}" onclick="openStepModal('${svc.id}','${plant.id}','${step.id}')">
        <span class="step-name">${esc(step.name)}</span>
        ${badge(step.status)}
      </div>`;
    }).join("");

    return `<div class="plant-card">
      <div class="plant-head">
        <span class="plant-name">${esc(plant.name)}</span>
        <span style="font-size:13px;font-weight:700;color:${pp===100?"var(--green)":"var(--teal)"}">${pp}%</span>
      </div>
      ${progressBar(pp, 7)}
      <div style="margin-top:8px">${steps}</div>
    </div>`;
  }).join("");

  return `<div class="svc-card" id="svc-card-${svc.id}">
    <div class="svc-card-head" id="svc-head-${svc.id}">
      <div class="flex between center mb8">
        <div class="svc-card-title">${esc(svc.name)}</div>
        <div class="svc-card-actions">${actionBtns}</div>
      </div>
      <div class="svc-card-meta">
        ${badge(st)}
        ${dateStr ? `<span style="font-size:12px;font-weight:600;color:${dateColor}">📅 ${dateStr}${dayLabel}</span>` : ""}
        <span class="small muted">🏗 ${svc.plants.length} planta${svc.plants.length!==1?"s":""} · ${all.length} etapa${all.length!==1?"s":""}</span>
      </div>
      <div class="flex center gap12">
        <div style="flex:1">${progressBar(p, 10)}</div>
        <span style="font-size:13px;font-weight:700;color:${p===100?"var(--green)":"var(--teal)"};min-width:36px">${p}%</span>
        <span class="chevron" id="chv-${svc.id}">▾</span>
      </div>
    </div>
    <div class="svc-card-body hidden" id="svc-body-${svc.id}">
      ${plantsHtml}
    </div>
  </div>`;
}

function toggleSvc(id) {
  const body = document.getElementById(`svc-body-${id}`);
  const chv  = document.getElementById(`chv-${id}`);
  body.classList.toggle("hidden");
  chv.classList.toggle("open");
}

function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ══════════════════════════════════════════════════════════════
// SERVICE ACTIONS
// ══════════════════════════════════════════════════════════════
async function concludeSvc(id) {
  if (!confirm("Marcar este serviço como concluído?")) return;
  await doUpdateService(id, "done");
}

async function reactivateSvc(id) {
  if (!confirm("Reativar este serviço?")) return;
  await doUpdateService(id, "in_progress");
}

async function doUpdateService(id, status) {
  try {
    const res = await apiPost({ action: "updateService", serviceId: id, status, actorId: state.user.id, token: state.user.token });
    if (!res.ok) throw new Error(res.error);
    toast(status === "done" ? "Serviço concluído ✅" : "Serviço reativado 🔄");
    await loadServices();
  } catch(e) { toast("Erro: " + e.message); }
}

async function deleteSvc(id) {
  if (!confirm("Remover este serviço permanentemente?")) return;
  try {
    const res = await apiPost({ action: "deleteService", serviceId: id, actorId: state.user.id, token: state.user.token });
    if (!res.ok) throw new Error(res.error);
    toast("Serviço removido");
    await loadServices();
  } catch(e) { toast("Erro: " + e.message); }
}

// ══════════════════════════════════════════════════════════════
// SERVICE MODAL (criar / editar)
// ══════════════════════════════════════════════════════════════
function openServiceModal(svcId) {
  const svc = svcId ? state.services.find(s => s.id === svcId) : null;

  // Estado interno do modal
  let plants = svc
    ? svc.plants.map(p => ({ id: p.id, name: p.name, stepCount: p.steps.length, steps: p.steps }))
    : [{ id: "_p0", name: "", stepCount: 1, steps: [] }];

  function buildPlants() {
    return plants.map((p, i) => `
      <div class="plant-builder">
        <div class="plant-builder-label">Planta ${i+1}</div>
        <div class="flex gap8 center">
          <input placeholder="Nome da planta" value="${esc(p.name)}" id="pname-${i}" style="flex:1">
          <div style="display:flex;flex-direction:column;gap:4px;min-width:70px">
            <label class="field-label" style="margin:0">Etapas</label>
            <input type="number" min="1" max="100" value="${p.stepCount}" id="pstep-${i}" style="text-align:center;width:70px">
          </div>
        </div>
      </div>`).join("");
  }

  function syncPlants(count) {
    const c = Math.max(1, Math.min(50, parseInt(count) || 1));
    while (plants.length < c) plants.push({ id: `_p${plants.length}`, name: "", stepCount: 1, steps: [] });
    plants = plants.slice(0, c);
    document.getElementById("sm-plants-area").innerHTML = buildPlants();
  }

  const html = `
    <div class="field"><label class="field-label">Nome do serviço</label>
      <input id="sm-name" value="${esc(svc?.name||"")}" placeholder="Ex: Impermeabilização…"></div>
    <div class="field"><label class="field-label">Data de previsão</label>
      <input id="sm-forecast" type="date" value="${svc?.forecast||""}"></div>
    <div class="field"><label class="field-label">Quantidade de plantas</label>
      <input id="sm-pcount" type="number" min="1" max="50" value="${plants.length}"></div>
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px">
      <div class="field-label" style="margin-bottom:10px;color:var(--navy)">Plantas</div>
      <div id="sm-plants-area">${buildPlants()}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="sm-save">Salvar</button>
    </div>`;

  openModal(svc ? "Editar serviço" : "Novo serviço", html);

  document.getElementById("sm-pcount").oninput = e => syncPlants(e.target.value);

  document.getElementById("sm-save").onclick = async () => {
    const name     = document.getElementById("sm-name").value.trim();
    const forecast = document.getElementById("sm-forecast").value;
    if (!name) return toast("Informe o nome do serviço.");
    if (!forecast) return toast("Informe a data de previsão.");

    // Lê dados das plantas do DOM
    const built = plants.map((p, i) => {
      const pname = document.getElementById(`pname-${i}`)?.value.trim();
      const sc    = parseInt(document.getElementById(`pstep-${i}`)?.value) || 1;
      if (!pname) throw { message: `Planta ${i+1}: informe o nome.` };
      const steps = Array.from({ length: sc }, (_, j) => ({
        id:     p.steps[j]?.id || null,
        name:   p.steps[j]?.name || `Etapa ${j+1}`,
        status: p.steps[j]?.status || "pending",
        note:   p.steps[j]?.note || "",
      }));
      return { id: p.id, name: pname, stepCount: sc, steps };
    });

    const btn = document.getElementById("sm-save");
    btn.disabled = true; btn.textContent = "Salvando…";

    try {
      const payload = { name, forecast, plants: built, actorId: state.user.id, token: state.user.token };
      const res = svc
        ? await apiPost({ action: "updateService", serviceId: svc.id, ...payload })
        : await apiPost({ action: "createService", ...payload });

      if (!res.ok) throw new Error(res.error);
      toast(svc ? "Serviço atualizado ✅" : "Serviço criado ✅");
      closeModal();
      await loadServices();
    } catch(e) {
      toast("Erro: " + e.message);
      btn.disabled = false; btn.textContent = "Salvar";
    }
  };
}

// ══════════════════════════════════════════════════════════════
// STEP MODAL
// ══════════════════════════════════════════════════════════════
function openStepModal(svcId, plantId, stepId) {
  const svc   = state.services.find(s => s.id === svcId);
  const plant = svc?.plants.find(p => p.id === plantId);
  const step  = plant?.steps.find(s => s.id === stepId);
  if (!step) return;

  const html = `
    <div class="field"><label class="field-label">Nome da etapa</label>
      <input id="stm-name" value="${esc(step.name)}"></div>
    <div class="field"><label class="field-label">Status</label>
      <select id="stm-status">
        ${Object.entries(STATUS).map(([k,v]) =>
          `<option value="${k}" ${step.status===k?"selected":""}>${v.icon} ${v.label}</option>`
        ).join("")}
      </select>
    </div>
    <div class="field"><label class="field-label">Observação</label>
      <textarea id="stm-note">${esc(step.note||"")}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-teal" id="stm-save">Salvar</button>
    </div>`;

  openModal(`${esc(plant.name)} › ${esc(step.name)}`, html);

  document.getElementById("stm-save").onclick = async () => {
    const btn = document.getElementById("stm-save");
    btn.disabled = true; btn.textContent = "Salvando…";
    try {
      const res = await apiPost({
        action: "updateStep",
        stepId: step.id,
        name:   document.getElementById("stm-name").value.trim(),
        status: document.getElementById("stm-status").value,
        note:   document.getElementById("stm-note").value,
        actorId: state.user.id,
        token:   state.user.token,
      });
      if (!res.ok) throw new Error(res.error);
      toast("Etapa atualizada ✅");
      closeModal();
      await loadServices();
    } catch(e) {
      toast("Erro: " + e.message);
      btn.disabled = false; btn.textContent = "Salvar";
    }
  };
}

// ══════════════════════════════════════════════════════════════
// ADMIN PANEL (gestão de usuários)
// ══════════════════════════════════════════════════════════════
async function openAdmin() {
  if (state.user.role !== "adm") return;

  async function loadUsersHtml() {
    const res = await apiFetch({ action: "getUsers", token: state.user.token });
    if (!res.ok) return `<p class="muted small">Erro ao carregar usuários.</p>`;
    return res.data.map(u => `
      <div class="user-row">
        <div>
          <span class="bold small">${esc(u.username)}</span>
          &nbsp;${roleBadge(u.role)}
          ${!u.active ? `<span class="badge badge-delayed" style="margin-left:4px">Inativo</span>` : ""}
        </div>
        ${u.id !== state.user.id ? `<button class="btn btn-sm btn-danger" onclick="deactivateUser('${u.id}','${esc(u.username)}')">Desativar</button>` : ""}
      </div>`).join("");
  }

  const usersHtml = await loadUsersHtml();

  const html = `
    <div style="margin-bottom:18px">
      <div class="field-label" style="color:var(--navy);margin-bottom:10px">Usuários cadastrados</div>
      <div id="admin-user-list">${usersHtml}</div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:16px">
      <div class="field-label" style="color:var(--navy);margin-bottom:10px">Novo usuário</div>
      <div class="field"><label class="field-label">Usuário</label><input id="nu-user" placeholder="nome de login"></div>
      <div class="field"><label class="field-label">Senha</label><input id="nu-pass" type="password" placeholder="senha"></div>
      <div class="field"><label class="field-label">Perfil</label>
        <select id="nu-role">
          <option value="colaborador">Colaborador</option>
          <option value="gestor">Gestor</option>
          <option value="adm">ADM</option>
        </select>
      </div>
      <button class="btn btn-primary w100" id="btn-create-user">Criar usuário</button>
    </div>
    <div class="modal-footer" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>`;

  openModal("⚙️ Administração", html);

  document.getElementById("btn-create-user").onclick = async () => {
    const username = document.getElementById("nu-user").value.trim();
    const password = document.getElementById("nu-pass").value;
    const role     = document.getElementById("nu-role").value;
    if (!username || !password) return toast("Preencha todos os campos.");

    const btn = document.getElementById("btn-create-user");
    btn.disabled = true; btn.textContent = "Criando…";

    try {
      const res = await apiPost({ action: "createUser", username, password, role, actorId: state.user.id, token: state.user.token });
      if (!res.ok) throw new Error(res.error);
      toast(`Usuário "${username}" criado ✅`);
      const uh = await loadUsersHtml();
      document.getElementById("admin-user-list").innerHTML = uh;
      document.getElementById("nu-user").value = "";
      document.getElementById("nu-pass").value = "";
    } catch(e) {
      toast("Erro: " + e.message);
    } finally {
      btn.disabled = false; btn.textContent = "Criar usuário";
    }
  };
}

async function deactivateUser(userId, username) {
  if (!confirm(`Desativar usuário "${username}"?`)) return;
  try {
    const res = await apiPost({ action: "deleteUser", userId, actorId: state.user.id, token: state.user.token });
    if (!res.ok) throw new Error(res.error);
    toast(`Usuário desativado`);
    openAdmin(); // reabrir painel atualizado
  } catch(e) { toast("Erro: " + e.message); }
}

// ══════════════════════════════════════════════════════════════
// MODAL HELPERS
// ══════════════════════════════════════════════════════════════
function openModal(title, bodyHtml) {
  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <h2>${title}</h2>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

function handleOverlayClick(e) {
  if (e.target.id === "modal-overlay") closeModal();
}

// ══════════════════════════════════════════════════════════════
// FILTERS & SEARCH
// ══════════════════════════════════════════════════════════════
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filter = btn.dataset.filter;
    renderList();
  };
});

document.getElementById("search-input").oninput = e => {
  state.search = e.target.value;
  renderList();
};

document.getElementById("btn-new-svc").onclick = () => openServiceModal();

// ══════════════════════════════════════════════════════════════
// AUTO-LOGIN via localStorage
// ══════════════════════════════════════════════════════════════
(function init() {
  const saved = localStorage.getItem("gs_session");
  if (saved) {
    try {
      state.user = JSON.parse(saved);
      showApp();
      return;
    } catch(e) {}
  }
})();
</script>
