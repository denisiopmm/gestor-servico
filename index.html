<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Obras</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root {
  --navy:#1A2B4A; --navy2:#243660; --blue:#2563EB; --blue-lt:#EFF4FF;
  --green:#16A34A; --green-lt:#F0FDF4; --red:#DC2626; --red-lt:#FEF2F2;
  --amber:#D97706; --amber-lt:#FFFBEB; --gray:#6B7280; --gray-lt:#F9FAFB;
  --border:#E5E7EB; --white:#FFFFFF; --radius:10px; --shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F1F5F9;color:#111827;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── Topbar ── */
#topbar{background:var(--navy);color:#fff;padding:0 18px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
#topbar .logo{font-weight:700;font-size:15px;letter-spacing:.3px;flex:1;display:flex;align-items:center;gap:8px}
#tb-proj{font-size:12px;opacity:.65;margin-right:6px}
#user-badge{display:flex;align-items:center;gap:6px;font-size:13px;background:rgba(255,255,255,.12);border-radius:99px;padding:4px 12px 4px 6px}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
#btn-logout{background:rgba(255,255,255,.15);border-radius:6px;padding:4px 10px;font-size:12px;color:#fff;margin-left:6px;display:flex;align-items:center;gap:4px}
#btn-logout:hover{background:rgba(255,255,255,.25)}

/* ── Tabs ── */
#tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:52px;z-index:99;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 14px;font-size:13px;font-weight:500;color:var(--gray);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .15s}
.tab-btn:hover{color:var(--navy)}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--blue);font-weight:600}
.nb{background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:1px 6px;line-height:1.4}

/* ── Sync bar ── */
#sync-bar{font-size:12px;padding:6px 16px;align-items:center;gap:8px;display:none}
#sync-bar.ok{background:#F0FDF4;color:var(--green);display:flex}
#sync-bar.error{background:#FEF2F2;color:var(--red);display:flex}
#sync-bar.loading{background:#EFF4FF;color:var(--blue);display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* ── Pages ── */
.page{display:none;padding:18px;max-width:960px;margin:0 auto}
.page.active{display:block}

/* ── Card ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── Floor blocks ── */
.floor-block{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.floor-hdr{background:var(--navy);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.floor-hdr .fname{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.floor-hdr .fpct{font-size:12px;opacity:.8;display:flex;align-items:center;gap:8px}
.pbar{width:80px;height:5px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;background:#34D399;border-radius:99px;transition:width .4s}
.floor-body{display:none}
.floor-body.open{display:block}

/* ── Service rows ── */
.svc-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.svc-row:last-child{border-bottom:none}
.svc-row:hover{background:var(--gray-lt)}
.svc-name{flex:1;font-size:13px}
.status-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;white-space:nowrap}
.s-pendente{background:#F3F4F6;color:#6B7280}
.s-em_andamento{background:#DBEAFE;color:#1D4ED8}
.s-concluido{background:#DCFCE7;color:#15803D}
.s-atrasado{background:#FEE2E2;color:#B91C1C}
.svc-date{font-size:11px;color:var(--gray);min-width:72px;text-align:right}

/* ── Dashboard KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
.kpi-num{font-size:30px;font-weight:700;line-height:1}
.kpi-lbl{font-size:11px;color:var(--gray);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* ── Modal ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
#overlay.open{display:flex}
#modal{background:var(--white);border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.modal-hdr h3{font-size:15px;font-weight:700;color:var(--navy)}
.modal-body{padding:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;outline:none;transition:border .15s;color:#111827}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field input:disabled,.field select:disabled,.field textarea:disabled{background:var(--gray-lt);color:var(--gray)}
.field textarea{resize:vertical;min-height:72px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── Buttons ── */
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.87}
.btn-primary{background:var(--blue);color:#fff}
.btn-ghost{background:var(--gray-lt);color:#374151;border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── Photo grid (modal) ── */
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-thumb{position:relative;width:80px;height:80px}
.photo-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.photo-del{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.upload-btn{width:80px;height:80px;border:2px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--gray);font-size:11px;cursor:pointer;transition:border .15s}
.upload-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── Alertas ── */
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;margin-bottom:8px}
.alert-item.red{background:var(--red-lt);border:1px solid #FECACA}
.alert-item.amber{background:var(--amber-lt);border:1px solid #FDE68A}
.alert-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.alert-item.red .alert-icon{color:var(--red)}
.alert-item.amber .alert-icon{color:var(--amber)}
.alert-txt{font-size:13px;font-weight:600}
.alert-sub{font-size:12px;color:var(--gray);margin-top:2px}

/* ── Fotos page ── */
.fotos-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.fotos-hdr{background:var(--gray-lt);padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--navy)}
.fotos-body{padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px}
.foto-item{cursor:pointer}
.foto-item img{width:90px;height:68px;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block}
.foto-cap{font-size:10px;color:var(--gray);margin-top:3px;text-align:center;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Lightbox ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
#lightbox.open{display:flex}
#lb-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px}
#lb-cap{color:#fff;font-size:13px;margin-top:12px;opacity:.6}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;cursor:pointer}
.lb-nav.prev{left:16px}.lb-nav.next{right:16px}
.lb-close{position:absolute;top:14px;right:16px;color:#fff;font-size:26px;cursor:pointer;background:none;border:none}

/* ── Relatório ── */
.rel-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.rel-option{border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer}
.rel-option input{accent-color:var(--blue);width:15px;height:15px;flex-shrink:0}
.floor-checks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.floor-check-item{display:flex;align-items:center;gap:5px;font-size:13px;background:var(--gray-lt);border-radius:6px;padding:5px 10px;cursor:pointer}
.floor-check-item input{accent-color:var(--blue)}
.quick-btns{display:flex;gap:10px;margin-bottom:12px}
.quick-btns button{font-size:12px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
.succ-banner{background:var(--green-lt);border:1px solid #BBF7D0;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;color:var(--green)}

/* ── Setup ── */
.setup-section{margin-bottom:22px}
.setup-section h3{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.setup-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--white)}
.sr-main{flex:1}
.sr-label{font-size:13px;font-weight:500}
.sr-sub{font-size:11px;color:var(--gray);margin-top:1px}
.setup-add{width:100%;padding:9px;border:2px dashed var(--border);border-radius:8px;font-size:13px;color:var(--gray);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;background:none;cursor:pointer;transition:all .15s}
.setup-add:hover{border-color:var(--blue);color:var(--blue)}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;white-space:nowrap}
.role-adm{background:#FEE2E2;color:#B91C1C}
.role-gestor{background:#DBEAFE;color:#1D4ED8}
.role-colaborador{background:#F3F4F6;color:#374151}

/* ── Login ── */
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
#login-box{background:var(--white);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo i{font-size:40px;color:var(--navy)}
#login-box h2{text-align:center;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:4px}
#login-proj-name{text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px}
#login-err{color:var(--red);font-size:13px;text-align:center;margin-bottom:8px;display:none;padding:8px;background:var(--red-lt);border-radius:8px}
#btn-login{width:100%;padding:11px;background:var(--navy);color:#fff;border-radius:8px;font-size:14px;font-weight:700;margin-top:6px;cursor:pointer;border:none;transition:background .2s}
#btn-login:hover{background:var(--navy2)}
#btn-login:disabled{opacity:.6;cursor:default}

/* ── Change password modal ── */
#pwd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:20px}
#pwd-overlay.open{display:flex}
#pwd-box{background:var(--white);border-radius:14px;width:100%;max-width:380px;padding:28px}
#pwd-box h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
#pwd-box p{font-size:13px;color:var(--gray);margin-bottom:20px}
#pwd-err{color:var(--red);font-size:13px;margin-bottom:10px;display:none;background:var(--red-lt);padding:8px;border-radius:6px}

/* ── Empty/no-perm ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--gray)}
.empty-state i{font-size:36px;margin-bottom:10px;display:block}
.empty-state p{font-size:14px;font-weight:500}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

@media(max-width:600px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .rel-options{grid-template-columns:1fr}
  #topbar .logo span{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="login-box">
    <div class="login-logo"><i class="ti ti-building-skyscraper"></i></div>
    <h2>Gestão de Obras</h2>
    <p id="login-proj-name">Carregando...</p>
    <div class="field"><label>Usuário</label><input id="li-user" type="text" placeholder="seu.usuario" autocomplete="username"></div>
    <div class="field"><label>Senha</label><input id="li-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="login-err"></div>
    <button id="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- TROCA DE SENHA (primeiro acesso) -->
<div id="pwd-overlay">
  <div id="pwd-box">
    <h3><i class="ti ti-lock" style="margin-right:6px;color:var(--amber)"></i>Crie sua senha</h3>
    <p>Este é seu primeiro acesso. Defina uma senha pessoal para continuar.</p>
    <div class="field"><label>Nova senha</label><input id="pwd-new" type="password" placeholder="mínimo 6 caracteres"></div>
    <div class="field"><label>Confirmar senha</label><input id="pwd-conf" type="password" placeholder="repita a senha"></div>
    <div id="pwd-err"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-primary" onclick="salvarNovaSenha()"><i class="ti ti-check"></i>Salvar e entrar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div class="logo"><i class="ti ti-building-skyscraper"></i><span>Gestão de Obras</span></div>
    <span id="tb-proj"></span>
    <div id="user-badge">
      <div class="avatar" id="user-avatar">?</div>
      <span id="user-name-top">—</span>
    </div>
    <button id="btn-logout" onclick="doLogout()"><i class="ti ti-logout"></i>Sair</button>
  </div>

  <div id="sync-bar"></div>

  <div id="tabs">
    <button class="tab-btn active" onclick="showPage('andamento')" id="tab-andamento"><i class="ti ti-checklist"></i>Andamento</button>
    <button class="tab-btn" onclick="showPage('dashboard')" id="tab-dashboard"><i class="ti ti-chart-bar"></i>Dashboard</button>
    <button class="tab-btn" onclick="showPage('alertas')" id="tab-alertas"><i class="ti ti-bell"></i>Alertas<span class="nb" id="abadge" style="display:none"></span></button>
    <button class="tab-btn" onclick="showPage('fotos')" id="tab-fotos"><i class="ti ti-photo"></i>Fotos</button>
    <button class="tab-btn" id="tab-relatorio" onclick="showPage('relatorio')" style="display:none"><i class="ti ti-file-text"></i>Relatório</button>
    <button class="tab-btn" id="tab-setup" onclick="showPage('setup')" style="display:none"><i class="ti ti-settings"></i>Config.</button>
  </div>

  <div class="page active" id="page-andamento"><div id="andamento-list"></div></div>
  <div class="page" id="page-dashboard"><div class="kpi-grid" id="kpi-grid"></div><div id="floor-chart"></div></div>
  <div class="page" id="page-alertas"><div id="alertas-list"></div></div>
  <div class="page" id="page-fotos"><div id="fotos-list"></div></div>

  <div class="page" id="page-relatorio">
    <div class="card">
      <div class="card-title"><i class="ti ti-file-analytics"></i>Gerar Relatório</div>
      <div class="rel-options">
        <label class="rel-option"><input type="checkbox" id="rel-fotos" checked> Incluir fotos</label>
        <label class="rel-option"><input type="checkbox" id="rel-obs" checked> Incluir observações</label>
        <label class="rel-option"><input type="checkbox" id="rel-conc" checked> Exibir concluídos</label>
        <label class="rel-option"><input type="checkbox" id="rel-atr" checked> Exibir atrasados</label>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px">Andares</div>
      <div class="quick-btns">
        <button onclick="selAll(true)">Marcar todos</button>
        <button onclick="selAll(false)">Desmarcar todos</button>
        <button onclick="selConcluidos()">Só concluídos</button>
      </div>
      <div class="floor-checks" id="floor-checks"></div>
      <button class="btn btn-primary" onclick="gerarRelatorio()"><i class="ti ti-printer"></i>Abrir relatório em nova aba</button>
    </div>
    <div id="preview-area"></div>
  </div>

  <div class="page" id="page-setup"><div id="setup-content"></div></div>
</div>

<!-- MODAL SERVIÇO / USUÁRIO -->
<div id="overlay" onclick="if(event.target===this)fecharModal()">
  <div id="modal">
    <div class="modal-hdr">
      <h3 id="modal-title">Serviço</h3>
      <button onclick="fecharModal()" style="color:var(--gray);font-size:20px;line-height:1"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="field"><label>Status</label>
        <select id="m-status">
          <option value="pendente">Pendente</option>
          <option value="em_andamento">Em andamento</option>
          <option value="concluido">Concluído</option>
        </select>
      </div>
      <div class="field"><label>Data de conclusão</label><input type="date" id="m-data"></div>
      <div class="field"><label>Observações</label><textarea id="m-obs" rows="3" placeholder="Detalhes, pendências..."></textarea></div>
      <div class="field">
        <label>Fotos</label>
        <div class="photo-grid" id="photo-grid">
          <label class="upload-btn" for="foto-input"><i class="ti ti-camera" style="font-size:22px"></i><span>Adicionar</span></label>
          <input type="file" id="foto-input" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">
        </div>
      </div>
    </div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="saveModal()"><i class="ti ti-device-floppy"></i>Salvar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLB()">
  <button class="lb-nav prev" onclick="event.stopPropagation();lbNav(-1)"><i class="ti ti-chevron-left"></i></button>
  <img id="lb-img" src="" alt="">
  <div id="lb-cap"></div>
  <button class="lb-nav next" onclick="event.stopPropagation();lbNav(1)"><i class="ti ti-chevron-right"></i></button>
  <button class="lb-close" onclick="closeLB()"><i class="ti ti-x"></i></button>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG — edite apenas esta linha
// ══════════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw5PixbCntzFRzQG0u31cAfbcaQLl1E9pQ1bN2393rdg_so8bJ19gq1euvVnL3jyQsKRA/exec';

// ══════════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════════
async function apiGet(acao){
  const r = await fetch(GAS_URL+'?acao='+acao);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
async function apiPost(body){
  const r = await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ══════════════════════════════════════════════════════════════
//  LOGIN / SESSÃO
// ══════════════════════════════════════════════════════════════
function checkSession(){
  const s=sessionStorage.getItem('_go_session');
  if(s){ try{ SESSION=JSON.parse(s); startApp(); return; }catch(_){} }
  carregarNomeProjeto();
}

async function carregarNomeProjeto(){
  try{
    const r=await apiGet('nomeProjeto');
    if(r?.ok&&r.data?.nome) document.getElementById('login-proj-name').textContent=r.data.nome;
    else document.getElementById('login-proj-name').textContent='';
  }catch(_){ document.getElementById('login-proj-name').textContent=''; }
}

async function doLogin(){
  const usuario=document.getElementById('li-user').value.trim();
  const senha  =document.getElementById('li-pass').value;
  const errEl  =document.getElementById('login-err');
  errEl.style.display='none';
  if(!usuario||!senha){ errEl.textContent='Preencha usuário e senha.'; errEl.style.display='block'; return; }
  const btn=document.getElementById('btn-login');
  btn.textContent='Entrando...'; btn.disabled=true;
  try{
    const r=await apiGet(`login&usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}`);
    if(!r?.ok){ errEl.textContent=r?.erro||'Usuário ou senha incorretos.'; errEl.style.display='block'; return; }
    const d=r.data;
    SESSION={ usuario, nome:d.nome||usuario, perfil:d.perfil||'colaborador', andares:d.andares||[], primeiroAcesso:!!d.primeiroAcesso };
    sessionStorage.setItem('_go_session',JSON.stringify(SESSION));
    apiPost({acao:'registrarAcesso',usuario,acao2:'login'}).catch(()=>{});
    if(SESSION.primeiroAcesso){ document.getElementById('pwd-overlay').classList.add('open'); }
    else{ document.getElementById('login-screen').style.display='none'; startApp(); }
  }catch(ex){ errEl.textContent='Erro de conexão. Verifique a URL do GAS.'; errEl.style.display='block'; }
  finally{ btn.textContent='Entrar'; btn.disabled=false; }
}

async function salvarNovaSenha(){
  const n=document.getElementById('pwd-new').value;
  const c=document.getElementById('pwd-conf').value;
  const err=document.getElementById('pwd-err');
  err.style.display='none';
  if(n.length<6){ err.textContent='Mínimo 6 caracteres.'; err.style.display='block'; return; }
  if(n!==c){ err.textContent='As senhas não coincidem.'; err.style.display='block'; return; }
  try{
    const r=await apiPost({acao:'trocarSenha',usuario:SESSION.usuario,novaSenha:n});
    if(!r?.ok){ err.textContent=r?.erro||'Erro ao salvar.'; err.style.display='block'; return; }
    SESSION.primeiroAcesso=false;
    sessionStorage.setItem('_go_session',JSON.stringify(SESSION));
    document.getElementById('pwd-overlay').classList.remove('open');
    document.getElementById('login-screen').style.display='none';
    showToast('Senha criada! Bem-vindo(a), '+SESSION.nome+'.');
    startApp();
  }catch(ex){ err.textContent='Erro: '+ex.message; err.style.display='block'; }
}

function doLogout(){
  apiPost({acao:'registrarAcesso',usuario:SESSION?.usuario,acao2:'logout'}).catch(()=>{});
  sessionStorage.removeItem('_go_session');
  SESSION=null; D={}; ANDARES=[]; ETAPAS=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('li-pass').value='';
  document.getElementById('login-err').style.display='none';
}

function startApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('user-name-top').textContent=SESSION.nome;
  document.getElementById('user-avatar').textContent=SESSION.nome.charAt(0).toUpperCase();

function setSyncBar(state,msg){
  const b=document.getElementById('sync-bar');
  const ico={loading:'loader-2 spin',ok:'circle-check',error:'alert-circle'};
  b.className=state;
  b.innerHTML=`<i class="ti ti-${ico[state]||'info'}"></i>${msg}`;
  if(state==='ok') setTimeout(()=>{b.className='';b.textContent='';},3000);
}

// ══════════════════════════════════════════════════════════════
//  CARREGAR DADOS
// ══════════════════════════════════════════════════════════════
async function loadFromSheets(){
  setSyncBar('loading','Sincronizando...');
  try{
    const r=await apiGet('tudo');
    if(!r?.ok){ setSyncBar('error','Erro: '+(r?.erro||'sem resposta')); return; }
    const d=r.data;
    CONFIG.projeto=d.projeto||'';
    document.getElementById('tb-proj').textContent=CONFIG.projeto;
    document.getElementById('login-proj-name').textContent=CONFIG.projeto;
    // Andares filtrados por perfil
    let andares=d.andares||[];
    if(SESSION.perfil==='colaborador'&&SESSION.andares?.length)
      andares=andares.filter(a=>SESSION.andares.includes(a.Andar));
    CONFIG.andares=andares;
    ANDARES=andares.map(a=>a.Andar);
    CONFIG.etapas=d.etapas||[];
    ETAPAS=CONFIG.etapas.map(e=>e.Etapa);
    CONFIG.usuarios=d.usuarios||[];
    // Montar D
    D={};
    (d.servicos||[]).forEach(s=>{
      if(!ANDARES.includes(s.Andar)) return;
      D[key(s.Andar,s.Etapa)]={ status:s.Status||'pendente', dataConclusao:s.DataConclusao||'', obs:s.Obs||'', fotos:[] };
    });
    (d.fotos||[]).forEach(f=>{
      if(!ANDARES.includes(f.Andar)) return;
      const k=key(f.Andar,f.Etapa);
      if(!D[k]) D[k]={status:'pendente',dataConclusao:'',obs:'',fotos:[]};
      D[k].fotos.push({url:f.Url,nome:f.NomeFoto});
    });
    setSyncBar('ok','Dados atualizados');
    renderAll();
    renderRelChecklist();
  }catch(ex){ setSyncBar('error','Erro: '+ex.message); }
}

// ══════════════════════════════════════════════════════════════
//  UTILITÁRIOS
// ══════════════════════════════════════════════════════════════
function key(a,e){ return a+'::'+e; }

function parseDateStr(val){
  if(!val) return '';
  const s=String(val).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){ const[d,m,y]=s.split('/'); return `${y}-${m}-${d}`; }
  if(/^\d{5,}$/.test(s)){ const dt=new Date(Math.round((Number(s)-25569)*86400000)); return dt.toISOString().substring(0,10); }
  const dt=new Date(s); if(!isNaN(dt)) return dt.toISOString().substring(0,10);
  return '';
}

function fmtDate(val){
  const s=parseDateStr(val); if(!s) return '—';
  return new Date(s+'T12:00:00').toLocaleDateString('pt-BR');
}

function fpct(a){
  const t=ETAPAS.length; if(!t) return 0;
  const c=ETAPAS.filter(e=>(D[key(a,e)]?.status==='concluido')).length;
  return Math.round(c/t*100);
}

function isAtrasado(a,e){
  const k=key(a,e),cfg=CONFIG.andares.find(x=>x.Andar===a);
  if(!cfg?.DataPrevista) return false;
  const prev=parseDateStr(cfg.DataPrevista); if(!prev) return false;
  if(D[k]?.status==='concluido') return false;
  return new Date(prev+'T23:59:59')<new Date();
}

function canEdit(){ return !!SESSION; }

function driveUrl(url){
  if(!url||url.startsWith('data:')) return url||'';
  let m=url.match(/\/file\/d\/([^\/\?&]+)/);
  if(!m) m=url.match(/[?&]id=([^&]+)/);
  if(m&&m[1]) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
  return url;
}

// ══════════════════════════════════════════════════════════════
//  RENDER — ANDAMENTO
// ══════════════════════════════════════════════════════════════
function renderAndamento(){
  const el=document.getElementById('andamento-list');
  if(!ANDARES.length){
    el.innerHTML=`<div class="empty-state"><i class="ti ti-building-off"></i><p>Nenhum andar atribuído.</p></div>`;
    return;
  }
  el.innerHTML=ANDARES.map(a=>{
    const pct=fpct(a);
    const rows=ETAPAS.map(e=>{
      const k=key(a,e),d=D[k]||{};
      let s=d.status||'pendente';
      if(s!=='concluido'&&isAtrasado(a,e)) s='atrasado';
      const cfg=CONFIG.andares.find(x=>x.Andar===a);
      const prev=cfg?.DataPrevista?fmtDate(cfg.DataPrevista):'';
      const hasExtra=d.obs||d.fotos?.length||d.dataConclusao;
      const a_=a.replace(/'/g,"\\'"), e_=e.replace(/'/g,"\\'");
      return `<div class="svc-row" onclick="openModal('${a_}','${e_}')">
        <i class="ti ti-${s==='concluido'?'circle-check':s==='atrasado'?'alert-circle':'circle'}" style="font-size:17px;color:${s==='concluido'?'var(--green)':s==='atrasado'?'var(--red)':'var(--border)'}"></i>
        <span class="svc-name">${e}</span>
        ${hasExtra?'<i class="ti ti-paperclip" style="font-size:13px;color:var(--gray)"></i>':''}
        <span class="status-tag ${STATUS_TAG[s]||'s-pendente'}">${STATUS_LBL[s]}</span>
        <span class="svc-date">${prev}</span>
      </div>`;
    }).join('');
    const id='fl-'+a.replace(/\W/g,'_');
    return `<div class="floor-block">
      <div class="floor-hdr" onclick="toggleFloor('${id}')">
        <span class="fname"><i class="ti ti-building"></i>${a}</span>
        <span class="fpct">${pct}% concluído<div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div></span>
      </div>
      <div class="floor-body" id="${id}">${rows}</div>
    </div>`;
  }).join('');
}

function toggleFloor(id){ document.getElementById(id)?.classList.toggle('open'); }

// ══════════════════════════════════════════════════════════════
//  RENDER — DASHBOARD
// ══════════════════════════════════════════════════════════════
function renderDashboard(){
  let tot=0,conc=0,atr=0,and=0;
  ANDARES.forEach(a=>ETAPAS.forEach(e=>{
    tot++;
    const s=D[key(a,e)]?.status||'pendente';
    if(s==='concluido') conc++;
    else if(isAtrasado(a,e)) atr++;
    else if(s==='em_andamento') and++;
  }));
  const pend=tot-conc-atr-and;
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi"><div class="kpi-num" style="color:var(--green)">${conc}</div><div class="kpi-lbl">Concluídos</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--blue)">${and}</div><div class="kpi-lbl">Em andamento</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--red)">${atr}</div><div class="kpi-lbl">Atrasados</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--gray)">${pend}</div><div class="kpi-lbl">Pendentes</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--navy)">${tot}</div><div class="kpi-lbl">Total</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--navy)">${tot?Math.round(conc/tot*100):0}%</div><div class="kpi-lbl">Progresso geral</div></div>`;
  document.getElementById('floor-chart').innerHTML=`<div class="card"><div class="card-title"><i class="ti ti-chart-bar"></i>Progresso por andar</div>${
    ANDARES.map(a=>{
      const pct=fpct(a);
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${a}</span><strong>${pct}%</strong></div>
        <div style="background:var(--border);border-radius:99px;height:8px;overflow:hidden">
          <div style="width:${pct}%;height:100%;border-radius:99px;background:${pct===100?'var(--green)':pct>=50?'var(--blue)':'var(--amber)'};transition:width .4s"></div>
        </div>
      </div>`;
    }).join('')
  }</div>`;
}

//  RENDER — ALERTAS

function renderAlertas(){
  const items=[];
  ANDARES.forEach(a=>{
    const cfg=CONFIG.andares.find(x=>x.Andar===a);
    ETAPAS.forEach(e=>{
      if(isAtrasado(a,e))
        items.push(`<div class="alert-item red"><i class="ti ti-alert-circle alert-icon"></i><div><div class="alert-txt">${a} — ${e}</div><div class="alert-sub">Previsto: ${cfg?.DataPrevista?fmtDate(cfg.DataPrevista):'—'}</div></div></div>`);
    });
  });
  const n=items.length;
  document.getElementById('abadge').textContent=n;
  document.getElementById('abadge').style.display=n?'inline':'none';
  document.getElementById('alertas-list').innerHTML=n?items.join(''):`<div class="empty-state"><i class="ti ti-circle-check" style="color:var(--green)"></i><p>Nenhum serviço atrasado!</p></div>`;
}

//  RENDER — FOTOS
// ══════════════════════════════════════════════════════════════
function renderFotos(){
  const html=ANDARES.map(a=>{
    let bl='';
    ETAPAS.forEach(e=>{
      const d=D[key(a,e)]; if(!d?.fotos?.length) return;
      d.fotos.forEach((f,i)=>{
        const a_=a.replace(/'/g,"\\'"),e_=e.replace(/'/g,"\\'");
        bl+=`<div class="foto-item" onclick="openLBS('${a_}','${e_}',${i})">
          <img src="${driveUrl(f.url||f.src||'')}" alt="${e}" onerror="this.style.display='none'">
          <div class="foto-cap">${e}</div>
        </div>`;
      });
    });
    if(!bl) return '';
    return `<div class="fotos-section"><div class="fotos-hdr"><i class="ti ti-building"></i>${a}</div><div class="fotos-body">${bl}</div></div>`;
  }).join('');
  document.getElementById('fotos-list').innerHTML=html||`<div class="empty-state"><i class="ti ti-photo-off"></i><p>Nenhuma foto registrada.</p></div>`;
}

// ══════════════════════════════════════════════════════════════
//  MODAL — SERVIÇO
// ══════════════════════════════════════════════════════════════
function openModal(a,e){
  _curA=a; _curE=e; _modalMode='servico';
  const d=D[key(a,e)]||{};
  // Restaura HTML padrão do modal caso tenha sido substituído por modal de usuário
  buildSvcModal();
  document.getElementById('modal-title').textContent=`${a} — ${e}`;
  document.getElementById('m-status').value=d.status||'pendente';
  document.getElementById('m-data').value=parseDateStr(d.dataConclusao)||'';
  document.getElementById('m-obs').value=d.obs||'';
  const ro=!canEdit();
  ['m-status','m-data','m-obs'].forEach(id=>document.getElementById(id).disabled=ro);
  document.getElementById('btn-salvar').style.display=ro?'none':'';
  mphotos=[...(d.fotos||[])];
  renderMP();
  document.getElementById('overlay').classList.add('open');
}

function buildSvcModal(){
  document.getElementById('modal-body').innerHTML=`
    <div class="field"><label>Status</label>
      <select id="m-status"><option value="pendente">Pendente</option><option value="em_andamento">Em andamento</option><option value="concluido">Concluído</option></select></div>
    <div class="field"><label>Data de conclusão</label><input type="date" id="m-data"></div>
    <div class="field"><label>Observações</label><textarea id="m-obs" rows="3" placeholder="Detalhes, pendências..."></textarea></div>
    <div class="field"><label>Fotos</label>
      <div class="photo-grid" id="photo-grid">
        <label class="upload-btn" for="foto-input"><i class="ti ti-camera" style="font-size:22px"></i><span>Adicionar</span></label>
        <input type="file" id="foto-input" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" id="btn-salvar" onclick="saveModal()"><i class="ti ti-device-floppy"></i>Salvar</button>`;
}

function fecharModal(){ document.getElementById('overlay').classList.remove('open'); }

async function saveModal(){
  if(_modalMode!=='servico') return;
  const status=document.getElementById('m-status').value;
  const data  =document.getElementById('m-data').value;
  const obs   =document.getElementById('m-obs').value;
  const k=key(_curA,_curE);
  if(!D[k]) D[k]={fotos:[]};
  D[k].status=status; D[k].dataConclusao=data; D[k].obs=obs;
  setSyncBar('loading','Salvando...');
  const r=await apiPost({acao:'salvarServico',Andar:_curA,Etapa:_curE,Status:status,DataConclusao:data,Obs:obs,Usuario:SESSION.usuario});
  if(!r?.ok){ showToast(r?.erro||'Erro ao salvar','error'); setSyncBar('error','Erro ao salvar'); return; }
  // Novas fotos
  const novas=mphotos.filter(f=>f.isNew);
  if(novas.length){
    const rf=await apiPost({acao:'salvarFotos',Andar:_curA,Etapa:_curE,fotos:novas.map(f=>({NomeFoto:f.nome,Base64:f.src})),Usuario:SESSION.usuario});
    if(rf?.ok&&rf.data?.fotos){
      const remotas=Object.values(rf.data.fotos).map((url,i)=>({url,nome:novas[i]?.nome||'foto'}));
      D[k].fotos=[...D[k].fotos.filter(f=>!f.isNew),...remotas];
    }
  }
  fecharModal();
  setSyncBar('ok','Salvo!');
  showToast('Salvo com sucesso!');
  renderAll();
}

// ── Fotos no modal ──
function renderMP(){
  const grid=document.getElementById('photo-grid');
  if(!grid) return;
  const thumbs=mphotos.map((f,i)=>`
    <div class="photo-thumb">
      <img src="${driveUrl(f.url||f.src||'')}" alt="" onerror="this.style.display='none'">
      <button class="photo-del" onclick="delMP(${i})"><i class="ti ti-x" style="font-size:10px"></i></button>
    </div>`).join('');
  grid.innerHTML=thumbs+`
    <label class="upload-btn" for="foto-input"><i class="ti ti-camera" style="font-size:22px"></i><span>Adicionar</span></label>
    <input type="file" id="foto-input" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">`;
}

async function delMP(i){
  const f=mphotos[i];
  if(!f.isNew){
    const r=await apiPost({acao:'excluirFoto',Andar:_curA,Etapa:_curE,indice:i});
    if(!r?.ok){ showToast(r?.erro||'Erro','error'); return; }
    const k=key(_curA,_curE); if(D[k]?.fotos) D[k].fotos.splice(i,1);
  }
  mphotos.splice(i,1); renderMP();
}

function lerB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); }); }

async function handleUpload(ev){
  for(const f of [...ev.target.files]) mphotos.push({nome:f.name,src:await lerB64(f),isNew:true});
  ev.target.value=''; renderMP();
}

          <div class="sr-main"><div class="sr-label">${a.Andar}</div><div class="sr-sub">Previsto: ${fmtDate(a.DataPrevista)||'—'}</div></div>
          <button class="btn btn-ghost btn-sm" onclick="editAndar(${i})"><i class="ti ti-pencil"></i></button>

      <h3><i class="ti ti-tools"></i>Tipos de serviço</h3>
      <div id="setup-etapas">${CONFIG.etapas.map((e,i)=>`
        <div class="setup-row">
          <div class="sr-main"><div class="sr-label">${e.Etapa}</div></div>

      <button class="setup-add" onclick="openUserModal(-1)"><i class="ti ti-plus"></i>Adicionar usuário</button>

function renderUsuariosSetup(){
  const cls={adm:'role-adm',gestor:'role-gestor',colaborador:'role-colaborador'};
  return CONFIG.usuarios.map((u,i)=>`
    <div class="setup-row">
      <div class="sr-main"><div class="sr-label">${u.Nome||u.Usuario}</div><div class="sr-sub">${u.Usuario} · ${u.Ativo==='TRUE'?'Ativo':'Inativo'}</div></div>
      <span class="role-badge ${cls[u.Perfil]||'role-colaborador'}">${u.Perfil||'colaborador'}</span>
      <button class="btn btn-ghost btn-sm" onclick="openUserModal(${i})"><i class="ti ti-pencil"></i></button>
      <button class="btn btn-danger btn-sm" onclick="delUsuario(${i})"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

async function salvarNomeProjeto(){
  const nome=document.getElementById('cfg-projeto').value.trim(); if(!nome) return;
  const r=await apiPost({acao:'salvarConfig',chave:'projeto',valor:nome});
  if(r?.ok){ CONFIG.projeto=nome; document.getElementById('tb-proj').textContent=nome; showToast('Nome salvo!'); }
  else showToast(r?.erro||'Erro','error');
}

async function addAndar(){
  const nome=prompt('Nome do andar/área:'); if(!nome?.trim()) return;
  const data=prompt('Data prevista (dd/mm/aaaa):','');
  const r=await apiPost({acao:'salvarAndar',Andar:nome.trim(),DataPrevista:data||''});
  if(r?.ok){ await loadFromSheets(); renderSetup(); showToast('Andar adicionado!'); }
  else showToast(r?.erro||'Erro','error');
}

async function editAndar(i){
  const a=CONFIG.andares[i];
  const nome=prompt('Nome do andar:',a.Andar); if(!nome?.trim()) return;
  const data=prompt('Data prevista:',a.DataPrevista||'');
  const r=await apiPost({acao:'editarAndar',index:i,Andar:nome.trim(),DataPrevista:data||''});
  if(r?.ok){ await loadFromSheets(); renderSetup(); }
  else showToast(r?.erro||'Erro','error');
}

async function delAndar(i){
  if(!confirm('Remover este andar? Todos os dados serão perdidos.')) return;
  const r=await apiPost({acao:'excluirAndar',index:i});
  if(r?.ok){ await loadFromSheets(); renderSetup(); showToast('Andar removido.'); }
  else showToast(r?.erro||'Erro','error');
}

async function addEtapa(){
  const nome=prompt('Nome do tipo de serviço:'); if(!nome?.trim()) return;
  const r=await apiPost({acao:'salvarEtapa',Etapa:nome.trim()});
  if(r?.ok){ await loadFromSheets(); renderSetup(); showToast('Serviço adicionado!'); }
  else showToast(r?.erro||'Erro','error');
}

async function editEtapa(i){
  const e=CONFIG.etapas[i];
  const nome=prompt('Nome do serviço:',e.Etapa); if(!nome?.trim()) return;
  const r=await apiPost({acao:'editarEtapa',index:i,Etapa:nome.trim()});

async function delEtapa(i){
  if(!confirm('Remover este tipo de serviço?')) return;
  const r=await apiPost({acao:'excluirEtapa',index:i});

// ── Modal de usuário ──────────────────────────────────────────
function openUserModal(idx){
  _editUserIdx=idx; _modalMode='usuario';
  const u=idx>=0?CONFIG.usuarios[idx]:null;
  const andChk=CONFIG.andares.map(a=>`
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:3px 0">
      <input type="checkbox" class="andar-chk" value="${a.Andar}" ${(u?.Andares||'').split(',').includes(a.Andar)?'checked':''}> ${a.Andar}
    </label>`).join('');
  document.getElementById('modal-title').textContent=u?'Editar usuário':'Novo usuário';
  document.getElementById('modal-body').innerHTML=`
    <div class="field"><label>Usuário (login)</label><input id="mu-user" value="${u?.Usuario||''}" placeholder="joao.silva" ${u?'readonly':''}></div>
    <div class="field"><label>Nome completo</label><input id="mu-nome" value="${u?.Nome||''}" placeholder="João Silva"></div>
    <div class="field"><label>Perfil</label>
      <select id="mu-perfil" onchange="toggleAndadesField()">
        <option value="colaborador" ${u?.Perfil==='colaborador'?'selected':''}>Colaborador</option>
        <option value="gestor" ${u?.Perfil==='gestor'?'selected':''}>Gestor</option>
        <option value="adm" ${u?.Perfil==='adm'?'selected':''}>Administrador</option>
      </select>
    </div>
    <div class="field" id="mu-andares-field" style="display:${!u||u.Perfil==='colaborador'?'block':'none'}">
      <label>Andares atribuídos</label>
      <div style="margin-top:6px;max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:10px">${andChk||'<span style="font-size:13px;color:var(--gray)">Nenhum andar cadastrado.</span>'}</div>
    </div>
    <div class="field" id="mu-ativo-field">
      <label>Status</label>
      <select id="mu-ativo"><option value="TRUE" ${!u||u.Ativo!=='FALSE'?'selected':''}>Ativo</option><option value="FALSE" ${u?.Ativo==='FALSE'?'selected':''}>Inativo</option></select>
    </div>
    ${!u?`<div class="field"><label>Senha inicial</label><input id="mu-senha" type="password" placeholder="mínimo 6 caracteres"></div>`:''}
    <div id="mu-err" style="color:var(--red);font-size:13px;display:none;background:var(--red-lt);padding:8px;border-radius:6px"></div>`;
  document.getElementById('modal-footer').innerHTML=`
    ${u?`<button class="btn btn-danger" onclick="delUsuario(${idx})"><i class="ti ti-trash"></i>Remover</button>`:''}
    <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarUsuario()"><i class="ti ti-check"></i>Salvar</button>`;
  document.getElementById('overlay').classList.add('open');
}

function toggleAndadesField(){
  const v=document.getElementById('mu-perfil')?.value;
  const f=document.getElementById('mu-andares-field');
  if(f) f.style.display=v==='colaborador'?'block':'none';
}

async function salvarUsuario(){
  const usuario=document.getElementById('mu-user')?.value.trim();
  const nome   =document.getElementById('mu-nome')?.value.trim();
  const perfil =document.getElementById('mu-perfil')?.value;
  const ativo  =document.getElementById('mu-ativo')?.value||'TRUE';
  const senha  =document.getElementById('mu-senha')?.value||'';
  const andares=[...document.querySelectorAll('.andar-chk:checked')].map(c=>c.value).join(',');
  const err=document.getElementById('mu-err');
  if(!usuario||!nome){ err.textContent='Usuário e nome são obrigatórios.'; err.style.display='block'; return; }
  if(_editUserIdx<0&&senha.length<6){ err.textContent='Senha deve ter no mínimo 6 caracteres.'; err.style.display='block'; return; }
  const body={acao:'salvarUsuario',usuario,nome,perfil,andares,ativo,index:_editUserIdx};
  if(_editUserIdx<0) body.senha=senha;
  const r=await apiPost(body);
  if(r?.ok){ fecharModal(); await loadFromSheets(); renderSetup(); showToast(_editUserIdx<0?'Usuário criado!':'Usuário atualizado!'); }
  else{ err.textContent=r?.erro||'Erro ao salvar.'; err.style.display='block'; }
}

async function delUsuario(i){
  if(!confirm('Remover este usuário?')) return;
  const r=await apiPost({acao:'excluirUsuario',index:i});
  if(r?.ok){ fecharModal(); await loadFromSheets(); renderSetup(); showToast('Usuário removido.'); }
  else showToast(r?.erro||'Erro','error');
}

//  RELATÓRIO
// ══════════════════════════════════════════════════════════════
function renderRelChecklist(){
  const el=document.getElementById('floor-checks'); if(!el) return;
  el.innerHTML=ANDARES.map((a,i)=>`<label class="floor-check-item"><input type="checkbox" id="rc${i}" checked> ${a}</label>`).join('');
}
function selAll(v){ ANDARES.forEach((_,i)=>{ const c=document.getElementById('rc'+i); if(c)c.checked=v; }); }
function selConcluidos(){ ANDARES.forEach((a,i)=>{ const c=document.getElementById('rc'+i); if(c)c.checked=fpct(a)===100; }); }

function gerarRelatorio(){
  const incFotos=document.getElementById('rel-fotos')?.checked;
  const incObs  =document.getElementById('rel-obs')?.checked;
  const incConc =document.getElementById('rel-conc')?.checked;
  const incAtr  =document.getElementById('rel-atr')?.checked;
  const andSel  =ANDARES.filter((_,i)=>document.getElementById('rc'+i)?.checked);
  if(!andSel.length){ showToast('Selecione ao menos um andar.','error'); return; }
  const hoje=new Date();
  const todayStr=hoje.toLocaleString('pt-BR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  let tot=0, totConc=0, totAtr=0;
  const corpo=andSel.map(a=>{
    const cfg=CONFIG.andares.find(x=>x.Andar===a);
    const pct=fpct(a);
    const rows=ETAPAS.map(e=>{
      const k=key(a,e), d=D[k]||{};
      let s=d.status||'pendente';
      if(s!=='concluido'&&isAtrasado(a,e)) s='atrasado';
      if(s==='concluido'){ totConc++; if(!incConc) return ''; }
      if(s==='atrasado'){ totAtr++; if(!incAtr) return ''; }
      tot++;
      const obsH=incObs&&d.obs?`<div style="font-size:12px;color:#374151;padding:6px 10px;background:#F9FAFB;border-radius:6px;margin-top:6px">${d.obs}</div>`:'';
      let ftsH='';
      if(incFotos&&d.fotos?.length){
        const imgs=d.fotos.map(f=>{
          const raw=f.url||f.src||''; if(!raw) return '';
          let src=raw;
          if(raw.startsWith('http')){ let m=raw.match(/\/file\/d\/([^\/\?&]+)/); if(!m)m=raw.match(/[?&]id=([^&]+)/); if(m&&m[1])src='https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800'; }
          return '<div style="width:calc(25% - 6px);flex-shrink:0"><img src="'+src+'" style="width:100%;height:auto;display:block;border-radius:6px;border:1px solid #E0E0E0" onerror="this.parentElement.style.display=\'none\'"></div>';
        }).join('');
        if(imgs) ftsH='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;width:100%">'+imgs+'</div>';
      }
      const hasDetails=obsH||ftsH;
      return '<tr style="border-bottom:'+(hasDetails?'none':'1px solid #F0F0F0')+'">'
        +'<td style="padding:10px 12px;font-size:13px">'+e+'</td>'
        +'<td style="padding:10px 12px"><span style="background:'+STATUS_BG[s]+';color:'+STATUS_COL[s]+';font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px">'+STATUS_LBL[s]+'</span></td>'
        +'<td style="padding:10px 12px;font-size:12px;color:#616161">'+(cfg?.DataPrevista?fmtDate(cfg.DataPrevista):'—')+'</td>'
        +'<td style="padding:10px 12px;font-size:12px;color:'+(s==='concluido'?'#1B5E20':'#616161')+';font-weight:'+(s==='concluido'?700:400)+'">'+(d.dataConclusao?fmtDate(d.dataConclusao):'—')+'</td>'
        +'</tr>'
        +(hasDetails?'<tr style="border-bottom:1px solid #F0F0F0"><td colspan="4" style="padding:0 14px 14px 14px">'+obsH+ftsH+'</td></tr>':'');
    }).join('');
    if(!rows.trim()) return '';
    return `<div style="margin-bottom:28px">
      <div style="background:#1A2B4A;color:#fff;padding:12px 16px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;font-size:15px">${a}</span><span style="font-size:12px;opacity:.8">${pct}% concluído</span>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid #E0E0E0;border-top:none">
        <thead><tr style="background:#F8F9FA">
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase">Serviço</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase">Status</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase">Previsto</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase">Conclusão</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }).join('');
  const htmlRel=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>${CONFIG.projeto} — Relatório</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#F5F5F5;color:#212121;padding:24px}@media print{body{background:#fff;padding:0}img{max-width:100%;page-break-inside:avoid}}</style>
  </head><body>
  <div style="background:#1A2B4A;color:#fff;border-radius:12px;padding:22px 26px;margin-bottom:24px">
    <h1 style="font-size:20px;font-weight:700">${CONFIG.projeto} — Relatório de Serviços</h1>
    <p style="font-size:13px;opacity:.7;margin-top:5px">Emitido em: ${todayStr} &nbsp;·&nbsp; ${andSel.length} andares selecionados</p>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:24px">
    <div style="flex:1;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:#15803D">${totConc}</div><div style="font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;margin-top:4px">Concluídos</div></div>
    <div style="flex:1;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:#B91C1C">${totAtr}</div><div style="font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;margin-top:4px">Atrasados</div></div>
    <div style="flex:1;background:#EFF4FF;border:1px solid #BFDBFE;border-radius:10px;padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:#1D4ED8">${tot}</div><div style="font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;margin-top:4px">Total</div></div>
  </div>
  ${corpo}
  <p style="text-align:center;font-size:12px;color:#999;margin-top:24px">Use Ctrl+P para salvar como PDF</p>
  </body></html>`;
  const win=window.open('','_blank');
  if(!win){ showToast('Permita pop-ups no navegador.','error'); return; }
  win.document.open(); win.document.write(htmlRel); win.document.close();
  document.getElementById('preview-area').innerHTML=`<div class="succ-banner"><i class="ti ti-circle-check" style="font-size:22px"></i><div>Relatório aberto em nova aba!<br><small>${andSel.length} andares · ${tot} serviços · Ctrl+P para salvar como PDF.</small></div></div>`;
}

function openLBS(a,e,i){ lbPh=(D[key(a,e)]?.fotos)||[]; lbIdx=i; showLB(); }
function showLB(){
  if(!lbPh.length) return;
  document.getElementById('lb-img').src=driveUrl(lbPh[lbIdx].url||lbPh[lbIdx].src||'');
  document.getElementById('lb-cap').textContent=(lbIdx+1)+'/'+lbPh.length;
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){ document.getElementById('lightbox').classList.remove('open'); }
function lbNav(d){ lbIdx=(lbIdx+d+lbPh.length)%lbPh.length; showLB(); }

// ══════════════════════════════════════════════════════════════
function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='setup') renderSetup();
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'var(--red)':'#111827';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function renderAll(){
  renderAndamento();
  renderDashboard();
  renderAlertas();
  renderFotos();
}
